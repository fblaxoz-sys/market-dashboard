name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Python syntax check
        run: python -m py_compile proxy_server.py scripts/daily_digest.py feature_discovery.py
      - name: Digest unit tests
        run: python tests/test_digest.py
      - name: Frontend guardrails (syntax + feature presence + month math)
        run: node tests/test_frontend.mjs
