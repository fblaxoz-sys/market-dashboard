name: Keep Alive
on:
  schedule:
    - cron: '*/10 13-21 * * 1-5'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: |
          if [ -z "$DASHBOARD_URL" ]; then echo "DASHBOARD_URL secret not set — skipping."; exit 0; fi
          curl -fsS --max-time 60 --retry 2 "${DASHBOARD_URL%/}/healthz" && echo " — warm"
